<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tulips Businesses</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f8f8f8;
    }

    header {
      background: #ff4d88;
      color: white;
      padding: 20px;
      text-align: center;
      font-size: 26px;
      font-weight: bold;
    }

    .container {
      padding: 30px;
      max-width: 1000px;
      margin: auto;
    }

    h1 {
      text-align: center;
      margin-bottom: 30px;
    }

    .products {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
    }

    .card {
      background: white;
      border-radius: 12px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      padding: 15px;
      text-align: center;
    }

    .card img {
      width: 100%;
      border-radius: 10px;
    }

    .card h3 {
      margin: 10px 0;
    }

    .btn {
      display: inline-block;
      padding: 10px 15px;
      background: #ff4d88;
      color: white;
      text-decoration: none;
      border-radius: 6px;
      margin-top: 10px;
    }

    .btn:hover {
      background: #e6005c;
    }
  </style>
</head>

<body>

<header>🌷 Tulips Businesses</header>

<div class="container">
  <h1>Trending Deals Just For You 🔥</h1>

  <div class="products">

    <div class="card">
      <img src="https://via.placeholder.com/300" alt="Product 1">
      <h3>Best Amazon Deal</h3>
      <p>Limited time offer. Grab now!</p>
      <a class="btn" href="https://amzn.to/3Q6trTE" target="_blank">Shop Now</a>
    </div>

    <div class="card">
      <img src="https://via.placeholder.com/300" alt="Product 2">
      <h3>Hot Selling Product</h3>
      <p>Top rated product trending today.</p>
      <a class="btn" href="https://amzn.to/4m2AFnN" target="_blank">Buy Now</a>
    </div>

  </div>
</div>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tulips Businesses</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
body { margin:0; font-family:'Poppins', sans-serif; background:#fff0f5; }

header {
  background: linear-gradient(45deg,#ff6f91,#ff9671);
  color:white;
  text-align:center;
  padding:20px;
}

.products {
  column-count:2;
  column-gap:15px;
  padding:15px;
}

@media(min-width:768px){
  .products{ column-count:4;}
}

.card {
  background:white;
  display:inline-block;
  margin-bottom:15px;
  width:100%;
  border-radius:15px;
  overflow:hidden;
  box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

.card img { width:100%; }

.card-content { padding:10px; }

.btn {
  display:block;
  text-align:center;
  padding:8px;
  margin-top:8px;
  background:#ff6f91;
  color:white;
  border-radius:10px;
  text-decoration:none;
}
</style>
</head>

<body>

<header>
<h1>Tulips Businesses 🌷</h1>
<p>Click → Shop → Earn 💸</p>
</header>

<section class="products" id="productList"></section>

<script>

// 🔥 EASY EDIT SECTION (ONLY EDIT THIS)
let products = [
  {
    name: "Trendy Handbag",
    image: "https://via.placeholder.com/300x400",
    link: "#"
  },
  {
    name: "Aesthetic Lamp",
    image: "https://via.placeholder.com/300x500",
    link: "#"
  body>
   <!-- <a href="https://amzn.to/3Q6trTE" target="_blank">
  <img src="YOUR-IMAGE-LINK-HERE" alt="Product" width="200">
</a>
<p>Click to buy this amazing product!</p>-->
</body>
},
  {
    name: "Makeup Kit",
    image: "https://via.placeholder.com/300x450",
    link: "#"
  }
];
// 🔥 END SECTION

let container = document.getElementById("productList");

products.forEach(p => {
  container.innerHTML += `
    <div class="card">
      <img src="${p.image}">
      <div class="card-content">
        <h3>${p.name}</h3>
        <a href="${p.link}" class="btn">Shop Now</a>
      </div>
    </div>
  `;
});

</script>

</body>
</html>
